name: Publish to npm

# THE publish path — tokenless. npm's trusted publisher for @askalf/deepdive
# is bound to THIS workflow filename (publish.yml): the job's OIDC token
# (id-token: write) authenticates the publish, no NPM_TOKEN secret anywhere.
# Provenance comes with it (SLSA attestation against this run).
#
# Two triggers:
#  - workflow_dispatch with a tag input — how auto-release.yml hands off
#    after cutting the GitHub release (releases created with GITHUB_TOKEN
#    deliberately don't fire `release: published`, so the chain dispatches
#    this workflow explicitly).
#  - release: published — the manual escape hatch: a maintainer cutting a
#    release by hand (gh release create locally) publishes without any
#    extra step.
#
# Node 24: the bundled npm is what speaks OIDC trusted publishing — older
# bundled npms fall back to looking for a token and fail.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.31.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Dispatch → the tag passed by auto-release; release event → the
          # release's own tag. Either way we build exactly what was tagged.
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Tag must match package.json version
        # A dispatch with the wrong tag (or a hand-cut release whose tag
        # drifted from the bump) must fail here, not publish a mismatch.
        run: |
          set -eo pipefail
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          PKG=$(node -pe "require('./package.json').version")
          if [ "$TAG" != "v$PKG" ]; then
            echo "::error::tag $TAG != package.json version v$PKG — refusing to publish"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      # Full gate parity with auto-release — the manual path shouldn't be
      # the one that can ship an untested build.
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: node dist/cli.js --help

      - name: npm publish (OIDC trusted publishing)
        run: npm publish --access public --provenance
