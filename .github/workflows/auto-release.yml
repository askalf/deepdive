name: Auto release on version bump

# Fires on merge of ANY PR to master. Exits early unless package.json's
# `version` field differs from the parent commit's — so PRs that don't
# touch version are cheap no-ops (~10s). When the version did change,
# builds+tests, creates the matching `vX.Y.Z` tag + GitHub release, then
# DISPATCHES publish.yml, which does the actual npm publish via OIDC
# trusted publishing (tokenless — npm's trusted publisher for
# @askalf/deepdive is bound to the publish.yml filename).
#
# Why dispatch rather than relying on publish.yml's `release: published`
# trigger: GitHub intentionally doesn't fire other workflows for events
# created by GITHUB_TOKEN (loop protection). So `gh release create` here
# creates the release but does NOT kick publish.yml on its own — which
# cost us a manual delete+recreate on v0.3.0 before this was understood.
# workflow_dispatch events ARE allowed to chain, so:
#   PR merge → this workflow → tag+release → dispatch publish.yml → npm.
#
# publish.yml's `release: published` trigger stays in place for the
# *manual* release case (a maintainer running `gh release create`
# locally does fire it, since that event isn't from GITHUB_TOKEN).

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write
  # actions: write lets this run dispatch publish.yml for the tokenless
  # npm publish. (id-token was needed here back when the publish was
  # inline; it now lives in publish.yml where the OIDC exchange happens.)
  actions: write
  id-token: write # keyless Sigstore signing (attest-build-provenance)
  attestations: write # persist the attestation in GitHub's store

jobs:
  release:
    # Guards stacked so a closed-but-not-merged PR or a merge that didn't
    # touch package.json never fires a release:
    #   1. pull_request event type must be `closed` (implicit from `on:`)
    #   2. `merged == true` rules out close-without-merge
    #   3. version-changed check (first step) short-circuits the rest
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master (post-merge state)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master
          fetch-depth: 2  # need HEAD^1 for the version-diff check

      - name: Check if version actually changed
        id: ver
        # Compares package.json's `version` field between HEAD and HEAD^1.
        # Unchanged → skip. Malformed (non-X.Y.Z) → abort loudly. Bumped
        # cleanly → proceed with `version` + `changed=true` as outputs.
        run: |
          set -eo pipefail
          CURRENT=$(node -pe "require('./package.json').version")
          PARENT=$(git show HEAD^1:package.json 2>/dev/null \
            | node -pe "JSON.parse(require('fs').readFileSync(0,'utf-8')).version" \
            || echo "")
          if [ "$CURRENT" = "$PARENT" ]; then
            echo "Version unchanged at $CURRENT — not releasing."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Refusing to release — package.json version '$CURRENT' doesn't match X.Y.Z" >&2
            exit 1
          fi
          echo "Version bumped: $PARENT → $CURRENT"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Ensure tag doesn't already exist
        if: steps.ver.outputs.changed == 'true'
        # Checked against the REMOTE: this checkout is shallow and
        # actions/checkout doesn't fetch tags (fetch-tags defaults false),
        # so the previous `git rev-parse "$TAG"` could never see an
        # existing tag — the guard was a silent no-op and duplicate-tag
        # protection was riding on `gh release create` erroring later.
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin — a previous run already released this version. Aborting to avoid tag-overwrite."
            exit 1
          fi

      # ─── Build + test pipeline (mirrors publish.yml) ──────────────
      # We do this BEFORE cutting the GitHub release, so a failing
      # build/test aborts everything — no release, no npm publish, no
      # half-shipped state. Node 22 matches publish.yml's choice.

      - name: Set up Node
        if: steps.ver.outputs.changed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: npm ci
        if: steps.ver.outputs.changed == 'true'
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci

      - name: typecheck
        if: steps.ver.outputs.changed == 'true'
        run: npm run typecheck

      - name: build
        if: steps.ver.outputs.changed == 'true'
        run: npm run build

      - name: test
        if: steps.ver.outputs.changed == 'true'
        run: npm test

      - name: --help smoke
        if: steps.ver.outputs.changed == 'true'
        run: node dist/cli.js --help

      # ─── Release + publish ────────────────────────────────────────

      - name: Extract release notes from CHANGELOG
        if: steps.ver.outputs.changed == 'true'
        # Pulls the section for this version from CHANGELOG.md so the
        # GitHub release body shows what was in the bump, not a generic
        # "see changelog" link. A committed, unit-tested script — the
        # previous inline lazy regex silently extracted the empty string
        # for every release since the extractor shipped (#135).
        run: |
          set -eo pipefail
          node .github/scripts/extract-release-notes.cjs "${{ steps.ver.outputs.version }}" > release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Create GitHub release
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          {
            echo "Auto-released from merge of [PR #${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})."
            echo ""
            cat release-notes.md
            echo ""
            echo "---"
            echo ""
            echo "Built + tested by \`auto-release.yml\`; npm publish runs tokenless in \`publish.yml\` via OIDC trusted publishing (provenance-attested)."
          } > body.md

          gh release create "$TAG" --title "$TAG" --notes-file body.md

      - name: Build npm tarball (release artifact)
        if: steps.ver.outputs.changed == 'true'
        id: pack
        run: |
          set -euo pipefail
          tarball=$(npm pack --silent)
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          sha256sum "$tarball"

      - name: Attest build provenance (keyless Sigstore)
        if: steps.ver.outputs.changed == 'true'
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Upload tarball + provenance bundle to the release
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.ver.outputs.version }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: |
          set -euo pipefail
          cp "$BUNDLE" "${TARBALL}.sigstore.json"
          gh release upload "$TAG" --clobber "$TARBALL" "${TARBALL}.sigstore.json"

      - name: Dispatch publish.yml (OIDC trusted publishing)
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          gh workflow run publish.yml --ref master -f tag="$TAG"
          echo "Dispatched publish.yml for $TAG — the npm publish happens there (tokenless)."

      - name: Post-release summary
        if: steps.ver.outputs.changed == 'true'
        run: |
          echo "✓ Released v${{ steps.ver.outputs.version }}"
          echo "✓ Triggered by PR #${{ github.event.pull_request.number }}"
          echo "✓ publish.yml dispatched — npm publish via OIDC trusted publishing"
