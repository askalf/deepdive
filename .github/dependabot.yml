# Dependabot version-update config.
#
# Security-advisory updates are already on via the repo-level "Dependabot
# security updates" setting; this file covers *version* updates (catching
# stale deps before they ship a vuln, not after).
#
# Non-major updates are grouped into a single weekly PR per ecosystem to
# keep noise down; majors still open individually so they get real review.

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      non-major:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      non-major:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: ci
      include: scope

  # Keeps the digest-pinned ClusterFuzzLite base image tracking upstream —
  # OSS-Fuzz pushes new builder images often, and a stale pin would slowly
  # drift the fuzz toolchain away from what OSS-Fuzz actually supports.
  - package-ecosystem: docker
    directory: /.clusterfuzzlite
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 2
    commit-message:
      prefix: ci
      include: scope
